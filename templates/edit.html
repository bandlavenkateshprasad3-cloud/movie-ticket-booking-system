<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:#f4f4f4;
        }

        .container{
            margin-top:80px;
            max-width:700px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card p-4 shadow">

        <h2 class="mb-4">
            ✏️ Edit Movie
        </h2>

        <form method="POST">

            <div class="mb-3">
                <label>Movie Title</label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ movie.title }}"
                    required
                >
            </div>

            <div class="mb-3">

                <label>Genre</label>

                <input
                    type="text"
                    name="genre"
                    class="form-control"
                    value="{{ movie.genre }}"
                    required
                >

            </div>

            <div class="mb-3">

                <label>Ticket Price</label>

                <input
                    type="number"
                    step="0.01"
                    name="ticket_price"
                    class="form-control"
                    value="{{ movie.ticket_price }}"
                    required
                >

            </div>

            <button class="btn btn-success">
                Update Movie
            </button>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

</div>

</body>
</html>
