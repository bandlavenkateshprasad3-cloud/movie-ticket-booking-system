<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Showtimes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
            background:#f4f4f4;
        }

        .container{
            margin-top:50px;
        }

        .card{
            border:none;
            border-radius:15px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1 class="text-center mb-4">🎟️ Manage Showtimes</h1>

    <a href="/" class="btn btn-secondary mb-4">Back to Movies</a>

    <div class="card p-4 shadow mb-4">

        <h3>Add Showtime</h3>

        <form action="/add_showtime" method="POST">

            <div class="mb-3">
                <label>Select Movie</label>
                <select name="movie_id" class="form-control" required>
                    {% for movie in movies %}
                    <option value="{{ movie.id }}">{{ movie.title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label>Theater Name</label>
                <input type="text" name="theater_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Show Date</label>
                <input type="date" name="show_date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Show Time</label>
                <input type="time" name="show_time" class="form-control" required>
            </div>

            <button class="btn btn-dark">Add Showtime</button>

        </form>

    </div>

    <table class="table table-striped table-bordered shadow bg-white">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Movie</th>
                <th>Theater</th>
                <th>Date</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for showtime in showtimes %}
            <tr>
                <td>{{ showtime.id }}</td>
                <td>{{ showtime.movie.title }}</td>
                <td>{{ showtime.theater_name }}</td>
                <td>{{ showtime.show_date }}</td>
                <td>{{ showtime.show_time }}</td>
                <td>
                    <a href="/delete_showtime/{{ showtime.id }}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
